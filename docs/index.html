<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pangea Ports</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111f;
      --panel: #13203a;
      --accent: #8cd0ff;
      --accent-2: #ffd280;
      --text: #edf5ff;
      --muted: #c2d4e7;
      --border: #27456f;
      --nav-h: 52px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top navbar ──────────────────────────────────────────── */
    nav {
      flex: 0 0 var(--nav-h);
      background: linear-gradient(180deg, #0e1b33 0%, #0b1528 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: 0 .75rem;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    nav::-webkit-scrollbar { height: 4px; }
    nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .nav-brand {
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      color: var(--accent);
      margin-right: .5rem;
      padding-right: .75rem;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: .88rem;
      padding: .35rem .7rem;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,.06);
      border-color: var(--border);
      color: var(--text);
    }
    .nav-btn.active {
      background: rgba(140,208,255,.14);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Content area ────────────────────────────────────────── */
    #content {
      flex: 1 1 0;
      position: relative;
      overflow: hidden;
    }

    /* Welcome screen shown before any game is selected */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      background: radial-gradient(circle at 50% 40%, #122446 0%, #0b1528 50%, #09111f 100%);
      text-align: center;
      padding: 2rem;
    }
    #welcome h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #welcome p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 520px;
      line-height: 1.7;
      margin: 0;
    }
    .game-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      justify-content: center;
      margin-top: .5rem;
    }
    .game-chip {
      background: rgba(140,208,255,.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: .9rem;
      padding: .5rem 1rem;
      transition: background .15s, border-color .15s;
    }
    .game-chip:hover {
      background: rgba(140,208,255,.18);
      border-color: var(--accent);
    }

    /* ── Game area: directly hosts the WebGL canvas ──────────── */
    #game-area {
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
    }
    #game-area.active { display: block; }

    /* WebGL canvas fills the game area */
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      background: #000;
    }

    /* Loading card overlays the canvas until the game starts */
    #loading-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: min(90%, 480px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    #loading-card.hidden { display: none; }
    #status-text {
      font-size: 1rem;
      color: var(--accent);
      min-height: 1.5rem;
      margin: 0 0 .75rem;
    }
    #progress-bar {
      width: 100%;
      max-width: 380px;
      height: 6px;
      accent-color: var(--accent);
      display: block;
      margin: 0 auto .4rem;
    }
    #progress-label {
      font-size: .78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">🕹 Pangea Ports</span>
    <button class="nav-btn" data-game="billy">Billy Frontier</button>
    <button class="nav-btn" data-game="bugdom">Bugdom</button>
    <button class="nav-btn" data-game="bugdom2">Bugdom 2</button>
    <button class="nav-btn" data-game="cromag">Cro-Mag Rally</button>
    <button class="nav-btn" data-game="mighty">Mighty Mike</button>
    <button class="nav-btn" data-game="nanosaur">Nanosaur</button>
    <button class="nav-btn" data-game="nanosaur2">Nanosaur 2</button>
    <button class="nav-btn" data-game="otto">Otto Matic</button>
  </nav>

  <div id="content">
    <!-- Welcome splash shown until a game is selected -->
    <div id="welcome">
      <h1>Pangea Ports</h1>
      <p>Select a game from the navbar above to play it directly in your browser. All games run as WebAssembly builds embedded on this page.</p>
      <div class="game-grid">
        <button class="game-chip" data-game="billy">Billy Frontier</button>
        <button class="game-chip" data-game="bugdom">Bugdom</button>
        <button class="game-chip" data-game="bugdom2">Bugdom 2</button>
        <button class="game-chip" data-game="cromag">Cro-Mag Rally</button>
        <button class="game-chip" data-game="mighty">Mighty Mike</button>
        <button class="game-chip" data-game="nanosaur">Nanosaur</button>
        <button class="game-chip" data-game="nanosaur2">Nanosaur 2</button>
        <button class="game-chip" data-game="otto">Otto Matic</button>
      </div>
    </div>

    <!-- Directly-embedded game canvas (no iframe; WASM runs in this page's context) -->
    <div id="game-area">
      <!-- Loading overlay: shown until the game runtime is ready -->
      <div id="loading-card">
        <p id="status-text">Loading…</p>
        <progress id="progress-bar" value="0" max="100"></progress>
        <p id="progress-label">Downloading game data…</p>
      </div>
      <!-- WebGL canvas — always in DOM so SDL3 can read clientWidth/clientHeight -->
      <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"
              width="1280" height="720"></canvas>
    </div>
  </div>

  <script>
    // GAME_SCRIPTS: game-id → JS loader path (loaded directly into this page, no iframe wrapper)
    var GAME_SCRIPTS = {
      billy:     './BillyFrontier-Android/game/billyfrontier.js',
      bugdom:    './Bugdom-android/Bugdom.js',
      bugdom2:   './Bugdom2-Android/Bugdom2.js',
      cromag:    './CroMagRally-Android/game/CroMagRally.js',
      mighty:    './MightyMike-Android/MightyMike.js',
      nanosaur:  './Nanosaur-android/game/Nanosaur.js',
      nanosaur2: './Nanosaur2-Android/Nanosaur2.js',
      otto:      './OttoMatic-Android/OttoMatic.js'
    };

    var GAME_NAMES = {
      billy: 'Billy Frontier', bugdom: 'Bugdom', bugdom2: 'Bugdom 2',
      cromag: 'Cro-Mag Rally', mighty: 'Mighty Mike', nanosaur: 'Nanosaur',
      nanosaur2: 'Nanosaur 2', otto: 'Otto Matic'
    };

    var activeGame = null;

    function selectGame(id) {
      if (!GAME_SCRIPTS[id]) return;

      // If a different game is already running, reload the page to switch
      if (activeGame && activeGame !== id) {
        location.hash = '#' + id;
        location.reload();
        return;
      }

      // Mark button active
      document.querySelectorAll('.nav-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.game === id);
      });

      // Swap welcome → game area
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('game-area').classList.add('active');

      if (!activeGame) {
        activeGame = id;
        document.title = GAME_NAMES[id] + ' – Pangea Ports';
        loadGame(id);
      }

      history.replaceState(null, '', '#' + id);
    }

    function loadGame(id) {
      var statusEl   = document.getElementById('status-text');
      var progressEl = document.getElementById('progress-bar');
      var labelEl    = document.getElementById('progress-label');
      var card       = document.getElementById('loading-card');

      statusEl.textContent = 'Loading ' + GAME_NAMES[id] + '…';

      // Sync canvas to its actual CSS size before the game initialises
      syncCanvasSize();

      // Configure Emscripten Module before the script is evaluated
      window.Module = {
        canvas: document.getElementById('canvas'),

        setStatus: function(text) {
          if (!text) {
            card.classList.add('hidden');
            return;
          }
          statusEl.textContent = text;
          var m = text.match(/(\d+)\/(\d+)/);
          if (m) {
            progressEl.value = parseInt(m[1], 10);
            progressEl.max   = parseInt(m[2], 10);
          }
        },

        monitorRunDependencies: function(n) {
          if (n === 0) {
            card.classList.add('hidden');
          } else {
            labelEl.textContent = 'Loading assets (' + n + ' remaining)…';
          }
        },

        onRuntimeInitialized: function() {
          card.classList.add('hidden');
        },

        print:    function(t) { console.log(t);   },
        printErr: function(t) { console.error(t); }
      };

      // Inject the game script – Emscripten resolves .wasm/.data relative to this JS URL
      var script  = document.createElement('script');
      script.src  = GAME_SCRIPTS[id];
      script.onerror = function() {
        statusEl.textContent = 'Failed to load ' + GAME_NAMES[id] + '.';
        labelEl.textContent  = 'Build artifacts may be missing from the deployment.';
      };
      document.body.appendChild(script);
    }

    // Keep canvas physical-pixel size in sync with its CSS size + device pixel ratio
    function syncCanvasSize() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;
      var cssW = canvas.clientWidth;
      var cssH = canvas.clientHeight;
      if (!cssW || !cssH) return;
      var dpr = window.devicePixelRatio || 1;
      var w = Math.round(cssW * dpr);
      var h = Math.round(cssH * dpr);
      if (w && h && (canvas.width !== w || canvas.height !== h)) {
        canvas.width  = w;
        canvas.height = h;
        if (window.Module && Module.setCanvasSize) {
          Module.setCanvasSize(w, h);
        }
      }
    }

    ['resize', 'fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange'].forEach(
      function(e) { window.addEventListener(e, function() { requestAnimationFrame(syncCanvasSize); }); }
    );

    // Wire all data-game buttons (navbar + welcome chips)
    document.querySelectorAll('[data-game]').forEach(function(btn) {
      btn.addEventListener('click', function() { selectGame(btn.dataset.game); });
    });

    // Restore from URL hash (e.g. after a game-switch reload)
    var _hash = window.location.hash.replace('#', '');
    if (_hash && GAME_SCRIPTS[_hash]) {
      selectGame(_hash);
    }
  </script>
</body>
</html>
