<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pangea Ports</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111f;
      --panel: #13203a;
      --accent: #8cd0ff;
      --accent-2: #ffd280;
      --text: #edf5ff;
      --muted: #c2d4e7;
      --border: #27456f;
      --nav-h: 52px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top navbar ──────────────────────────────────────────── */
    nav {
      flex: 0 0 var(--nav-h);
      background: linear-gradient(180deg, #0e1b33 0%, #0b1528 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: 0 .75rem;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    nav::-webkit-scrollbar { height: 4px; }
    nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .nav-brand {
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      color: var(--accent);
      margin-right: .5rem;
      padding-right: .75rem;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: .88rem;
      padding: .35rem .7rem;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,.06);
      border-color: var(--border);
      color: var(--text);
    }
    .nav-btn.active {
      background: rgba(140,208,255,.14);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Content area ────────────────────────────────────────── */
    #content {
      flex: 1 1 0;
      position: relative;
      overflow: hidden;
    }

    /* Welcome screen shown before any game is selected */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      background: radial-gradient(circle at 50% 40%, #122446 0%, #0b1528 50%, #09111f 100%);
      text-align: center;
      padding: 2rem;
    }
    #welcome h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #welcome p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 520px;
      line-height: 1.7;
      margin: 0;
    }
    .game-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      justify-content: center;
      margin-top: .5rem;
    }
    .game-chip {
      background: rgba(140,208,255,.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: .9rem;
      padding: .5rem 1rem;
      transition: background .15s, border-color .15s;
    }
    .game-chip:hover {
      background: rgba(140,208,255,.18);
      border-color: var(--accent);
    }

    /* Game iframes — stacked, only one visible at a time */
    .game-frame {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .game-frame.active { display: block; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">🕹 Pangea Ports</span>
    <button class="nav-btn" data-game="billy">Billy Frontier</button>
    <button class="nav-btn" data-game="bugdom">Bugdom</button>
    <button class="nav-btn" data-game="bugdom2">Bugdom 2</button>
    <button class="nav-btn" data-game="cromag">Cro-Mag Rally</button>
    <button class="nav-btn" data-game="mighty">Mighty Mike</button>
    <button class="nav-btn" data-game="nanosaur">Nanosaur</button>
    <button class="nav-btn" data-game="nanosaur2">Nanosaur 2</button>
    <button class="nav-btn" data-game="otto">Otto Matic</button>
  </nav>

  <div id="content">
    <!-- Welcome splash shown until a game is selected -->
    <div id="welcome">
      <h1>Pangea Ports</h1>
      <p>Select a game from the navbar above to play it directly in your browser. All games run as WebAssembly builds embedded on this page.</p>
      <div class="game-grid">
        <button class="game-chip" data-game="billy">Billy Frontier</button>
        <button class="game-chip" data-game="bugdom">Bugdom</button>
        <button class="game-chip" data-game="bugdom2">Bugdom 2</button>
        <button class="game-chip" data-game="cromag">Cro-Mag Rally</button>
        <button class="game-chip" data-game="mighty">Mighty Mike</button>
        <button class="game-chip" data-game="nanosaur">Nanosaur</button>
        <button class="game-chip" data-game="nanosaur2">Nanosaur 2</button>
        <button class="game-chip" data-game="otto">Otto Matic</button>
      </div>
    </div>

    <!-- One iframe per game; src is set lazily when first selected -->
    <iframe class="game-frame" id="frame-billy"     title="Billy Frontier"  allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-bugdom"    title="Bugdom"          allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-bugdom2"   title="Bugdom 2"        allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-cromag"    title="Cro-Mag Rally"   allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-mighty"    title="Mighty Mike"     allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-nanosaur"  title="Nanosaur"        allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-nanosaur2" title="Nanosaur 2"      allow="fullscreen; autoplay"></iframe>
    <iframe class="game-frame" id="frame-otto"      title="Otto Matic"      allow="fullscreen; autoplay"></iframe>
  </div>

  <script>
    var GAME_URLS = {
      billy:     './BillyFrontier-Android/game/billyfrontier.html',
      bugdom:    './Bugdom-android/game.html',
      bugdom2:   './Bugdom2-Android/Bugdom2.html',
      cromag:    './CroMagRally-Android/game/CroMagRally.html',
      mighty:    './MightyMike-Android/',
      nanosaur:  './Nanosaur-android/game/index.html',
      nanosaur2: './Nanosaur2-Android/Nanosaur2.html',
      otto:      './OttoMatic-Android/OttoMatic.html'
    };

    var currentGame = null;

    function selectGame(id) {
      if (!GAME_URLS[id]) return;
      currentGame = id;

      // Update navbar button states
      document.querySelectorAll('.nav-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.game === id);
      });

      // Hide welcome screen
      document.getElementById('welcome').style.display = 'none';

      // Show/hide iframes; load src lazily on first activation
      document.querySelectorAll('.game-frame').forEach(function(frame) {
        var frameGame = frame.id.replace('frame-', '');
        if (frameGame === id) {
          if (!frame.getAttribute('src')) {
            frame.src = GAME_URLS[id];
          }
          frame.classList.add('active');
        } else {
          frame.classList.remove('active');
        }
      });

      // Persist selection in the URL hash so reloads restore the same game
      history.replaceState(null, '', '#' + id);
    }

    // Wire up all game-selection buttons (navbar + welcome chips)
    document.querySelectorAll('[data-game]').forEach(function(btn) {
      btn.addEventListener('click', function() { selectGame(btn.dataset.game); });
    });

    // Restore game from URL hash on page load
    var hash = window.location.hash.replace('#', '');
    if (hash && GAME_URLS[hash]) {
      selectGame(hash);
    }
  </script>
</body>
</html>
