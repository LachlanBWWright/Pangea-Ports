name: Build Ports

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the built artifacts as a GitHub release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag to create/update when publishing manually
        required: false
        default: ''
        type: string
      release_name:
        description: Release name for manual publishing
        required: false
        default: Pangea Ports build
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ports-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrices:
    runs-on: ubuntu-latest
    outputs:
      wasm: ${{ steps.wasm.outputs.matrix }}
      android_apk: ${{ steps.android_apk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: wasm
        run: echo "matrix=$(python3 scripts/ports.py matrix wasm)" >> "$GITHUB_OUTPUT"
      - id: android_apk
        run: echo "matrix=$(python3 scripts/ports.py matrix android-apk)" >> "$GITHUB_OUTPUT"

  build-wasm:
    needs: prepare-matrices
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrices.outputs.wasm) }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: .emsdk
          key: emsdk-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: emsdk-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Emscripten SDK
        run: |
          if [ ! -f .emsdk/emsdk ]; then
            git clone --depth=1 https://github.com/emscripten-core/emsdk.git .emsdk
            .emsdk/emsdk install latest
          fi
          .emsdk/emsdk activate latest
          source .emsdk/emsdk_env.sh
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/bin" >> "$GITHUB_PATH"
          for d in "$EMSDK/node/"*/bin; do [ -d "$d" ] && echo "$d" >> "$GITHUB_PATH"; done
      - name: Build WASM port
        run: python3 scripts/ports.py run --game "${{ matrix.name }}" --task wasm-build
      - name: Stage WASM site files
        run: python3 scripts/ports.py run --game "${{ matrix.name }}" --task stage-wasm --dest "$RUNNER_TEMP/site/${{ matrix.name }}"
      - name: Create archive
        run: |
          cd "$RUNNER_TEMP/site/${{ matrix.name }}"
          zip -r "$RUNNER_TEMP/${{ matrix.name }}-wasm.zip" .
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-wasm
          path: ${{ runner.temp }}/${{ matrix.name }}-wasm.zip
          compression-level: 0
      - name: Upload site fragment
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-site
          path: ${{ runner.temp }}/site/${{ matrix.name }}
          compression-level: 0

  build-android-apk:
    needs: prepare-matrices
    if: needs.prepare-matrices.outputs.android_apk != '{"include":[]}'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrices.outputs.android_apk) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build APKs
        run: |
          cd games/Bugdom2-Android/android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bugdom2-Android-apk
          path: games/Bugdom2-Android/android/app/build/outputs/apk
          compression-level: 0

  assemble-pages:
    needs: build-wasm
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4.1.3
        with:
          path: site-artifacts
      - name: Assemble Pages site
        run: |
          mkdir -p site
          cp docs/index.html site/index.html
          touch site/.nojekyll
          find site-artifacts -mindepth 1 -maxdepth 1 -type d -name '*-site' | while read -r dir; do
            game_dir=$(basename "$dir" | sed 's/-site$//')
            mkdir -p "site/$game_dir"
            cp -r "$dir"/. "site/$game_dir/"
          done
      - name: Archive assembled Pages site
        run: |
          cd site
          zip -r "$RUNNER_TEMP/pangea-pages-site.zip" .
      - name: Upload Pages site artifact
        uses: actions/upload-artifact@v4
        with:
          name: pangea-pages-site
          path: ${{ runner.temp }}/pangea-pages-site.zip
          compression-level: 0
      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        id: deploy
        uses: actions/deploy-pages@v4

  publish-release:
    needs:
      - build-wasm
      - build-android-apk
      - assemble-pages
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4.1.3
        with:
          path: release-artifacts
      - name: Choose release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "name=Pangea Ports ${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate release tag
        run: test -n "${{ steps.release_meta.outputs.tag }}"
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: |
            Automated multi-port build from `${{ github.sha }}`.

            Included artifacts:
            - WebAssembly bundles for all imported games
            - Downloadable multi-game GitHub Pages site zip
            - Bugdom 2 Android APKs

            Note: Bugdom 2 is currently the only imported game with a checked-in Android Gradle project, so it is the only game that produces APKs in this workflow today.
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.apk
