name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish APK artifacts as a GitHub release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag to create/update when publishing manually
        required: false
        default: ''
        type: string
      release_name:
        description: Release name for manual publishing
        required: false
        default: Pangea Ports Android build
        type: string

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      android_apk: ${{ steps.android_apk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: android_apk
        run: echo "matrix=$(python3 scripts/ports.py matrix android-apk)" >> "$GITHUB_OUTPUT"

  build-android-apk:
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.android_apk != '{"include":[]}'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.android_apk) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build APKs
        run: |
          cd games/Bugdom2-Android/android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-apk
          path: games/Bugdom2-Android/android/app/build/outputs/apk
          compression-level: 0

  publish-apk-release:
    needs: build-android-apk
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4.1.3
        with:
          path: release-artifacts
      - name: Choose release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "name=Pangea Ports ${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate release tag
        run: test -n "${{ steps.release_meta.outputs.tag }}"
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: |
            Automated Android APK build from `${{ github.sha }}`.

            Included artifacts:
            - Bugdom 2 Android APKs (debug and release)

            Note: Bugdom 2 is currently the only imported game with a checked-in Android Gradle project.
          files: |
            release-artifacts/**/*.apk
