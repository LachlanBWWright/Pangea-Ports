apply plugin: 'com.android.application'

android {
    namespace 'io.jor.bugdom2'
    compileSdk 34
    ndkVersion "27.0.12077973"

    defaultConfig {
        applicationId "io.jor.bugdom2"
        minSdk 24
        targetSdk 34
        versionCode 401
        versionName "4.0.1"
        ndk {
            abiFilters 'arm64-v8a'
        }
        externalNativeBuild {
            cmake {
                arguments "-DSDL_STATIC=ON",
                          "-DBUILD_SDL_FROM_SOURCE=ON"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "../../CMakeLists.txt"
            version "3.22.1+"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            // Game data assets packaged into APK
            assets.srcDirs = ['../../Data']
        }
    }
}

dependencies {
}
